AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Photo Album Application - Requirement 7. This template creates S3 buckets,
  Lambdas, and API Gateway.

Resources:
  # -----------------------------------------------------------------
  # 1. S3 Buckets
  # -----------------------------------------------------------------
  PhotoStorageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub jm11065-${AWS::StackName}-photos-storage

  FrontendWebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub jm11065-${AWS::StackName}-frontend-site
      # Fix: Using OwnershipControls instead of PublicReadAccessEnabled to avoid validation errors
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html

  # -----------------------------------------------------------------
  # 2. Lambda Functions
  # -----------------------------------------------------------------
  IndexPhotosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: index-photos.lambda_handler
      Runtime: python3.9
      Policies:
        - AmazonS3ReadOnlyAccess
        - AmazonRekognitionReadOnlyAccess
        - AmazonOpenSearchServiceFullAccess
      Events:
        S3UploadEvent:
          Type: S3
          Properties:
            Bucket: !Ref PhotoStorageBucket
            Events: s3:ObjectCreated:*

  SearchPhotosFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: lambdas/
      Handler: search-photos.lambda_handler
      Runtime: python3.9
      Policies:
        - AmazonOpenSearchServiceReadOnlyAccess
      Events:
        SearchApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref PhotoAlbumAPI
            Path: /search
            Method: get

  # -----------------------------------------------------------------
  # 3. API Gateway 
  # -----------------------------------------------------------------
  PhotoAlbumAPI:
    Type: AWS::Serverless::Api
    Properties:
      StageName: v1
      Cors:
        AllowMethods: "'GET,POST,PUT,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,x-api-key'"
        AllowOrigin: "'*'"

# -----------------------------------------------------------------
# 4. Outputs
# -----------------------------------------------------------------
Outputs:
  FrontendURL:
    Description: "The public URL of your photo album website"
    Value: !GetAtt FrontendWebsiteBucket.WebsiteURL
  APIEndpoint:
    Description: "The base URL of your API"
    Value: !Sub "https://${PhotoAlbumAPI}.execute-api.${AWS::Region}.amazonaws.com/v1/"
